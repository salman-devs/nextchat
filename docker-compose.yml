version: '3.8'

services:
  backend:
    build: ./backend
    container_name: nextchat-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/uploads:/app/uploads
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: nextchat-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped